# yt-x Configuration File
# Terminal YouTube Browser & Downloader

# ===== Display Settings =====
PRETTY_PRINT=true
EDITOR=nvim
PREFERRED_SELECTOR=fzf
IMAGE_RENDERER=chafa
NOTIFICATION_DURATION=5

# ===== Video Playback =====
PLAYER=mpv
VIDEO_QUALITY=1080
DISOWN_STREAMING_PROCESS=true

# ===== Download Settings =====
DOWNLOAD_DIRECTORY=~/Videos/yt-x
AUDIO_QUALITY=192
MERGE_OUTPUT_FORMAT=mkv

# ===== History & Tracking =====
UPDATE_RECENT=true
NO_OF_RECENT=30
SEARCH_HISTORY=true

# ===== Search & Results =====
NO_OF_SEARCH_RESULTS=30
REGION_CODE=US
LANGUAGE=en

# ===== Browser Integration =====
PREFERRED_BROWSER=firefox

# ===== Updates =====
UPDATE_CHECK=true

# ===== Auto-loaded Extensions =====
# Uncomment to auto-load extensions on startup
# AUTO_LOADED_EXTENSIONS=mix,downloads
