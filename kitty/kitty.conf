# vim:fileencoding=utf-8:foldmethod=marker

# Font settings
font_family      Maple Mono NF
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono NF Bold Italic
font_size 12.0
adjust_line_height 115%

# Cursor
cursor_blink_interval 0
cursor_shape block

# Scrollback
scrollback_lines 5000
scrollback_pager_history_size 0

# Window
hide_window_decorations titlebar-only

# Misc
macos_option_as_alt yes
text_composition_strategy legacy
# macos_thicken_font 0.1

# Theme
include current-theme.conf

# Colors These values too can be used default, displayp3, srgb (browser colors)
macos_colorspace displayp3

# Glossy Background
background_opacity 0.8
background_blur 20

# Disable option key for kitty
map modifier none Option

# Adding font features
font_features MapleMono-NF-Regular +ss01 +cv03
font_features MapleMono-NF-Bold +ss01 +cv03
font_features MapleMono-NF-Italic +ss01 +cv03
font_features MapleMono-NF-BoldItalic +ss01 +cv03

# Enable remote control
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Performance tuning
input_delay 0
repaint_delay 2
sync_to_monitor no

# Mouse behavior
mouse_hide_wait -3.0
copy_on_select yes
strip_trailing_spaces smart

# Keyboard shortcuts
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+k clear_terminal scroll active
map cmd+shift+enter new_window_with_cwd
map cmd+t new_tab_with_cwd
map cmd+w close_window
map cmd+shift+w close_tab
map cmd+] next_tab
map cmd+[ previous_tab
map cmd+shift+] move_tab_forward
map cmd+shift+[ move_tab_backward
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab 10
map cmd+shift+f toggle_fullscreen
map cmd+shift+ctrl+f reload_config_file
